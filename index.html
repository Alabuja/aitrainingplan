<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Training Plan Generator</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172026;
      --muted: #5a6670;
      --line: #d8ded8;
      --paper: #fbfaf6;
      --panel: #ffffff;
      --accent: #176f6a;
      --accent-dark: #0f4e4a;
      --signal: #c7512c;
      --soft: #edf3ef;
      --shadow: 0 18px 42px rgba(23, 32, 38, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(23, 111, 106, 0.12), transparent 42%),
        linear-gradient(315deg, rgba(199, 81, 44, 0.11), transparent 40%),
        var(--paper);
    }

    main {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(280px, 390px) minmax(0, 1fr);
      gap: 22px;
      align-items: stretch;
    }

    .panel {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .builder {
      padding: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 2.8rem);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .domain {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    label {
      display: grid;
      gap: 7px;
      margin-top: 16px;
      font-size: 0.85rem;
      font-weight: 750;
      color: #2c3940;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 46px;
      border: 1px solid #c8d0ca;
      border-radius: 6px;
      padding: 11px 12px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: 3px solid rgba(23, 111, 106, 0.18);
      border-color: var(--accent);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 6px;
      padding: 0 15px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .primary {
      flex: 1;
      background: var(--accent);
      color: #fff;
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .secondary {
      width: 52px;
      background: var(--soft);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .output {
      min-height: calc(100vh - 64px);
      padding: 24px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
    }

    .output-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
    }

    .kicker {
      margin: 0 0 7px;
      color: var(--signal);
      font-size: 0.78rem;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    h2 {
      margin: 0;
      font-size: clamp(1.35rem, 2.2vw, 2rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .copy {
      white-space: nowrap;
      background: var(--ink);
      color: #fff;
    }

    .weeks {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .week {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: #fff;
    }

    .week h3 {
      margin: 0 0 10px;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .week ul {
      margin: 0;
      padding-left: 18px;
      color: #2f3b41;
    }

    .week li {
      margin: 8px 0;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--soft);
    }

    .metric strong {
      display: block;
      font-size: 1.2rem;
    }

    .metric span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    @media (max-width: 850px) {
      main {
        width: min(100% - 24px, 680px);
        padding: 12px 0;
      }

      .shell,
      .weeks {
        grid-template-columns: 1fr;
      }

      .output {
        min-height: auto;
      }
    }

    @media (max-width: 520px) {
      .row,
      .metrics {
        grid-template-columns: 1fr;
      }

      .output-head {
        display: grid;
      }

      .copy {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="shell">
      <section class="panel builder" aria-label="Training plan inputs">
        <div class="brand">
          <div>
            <p class="domain">aitrainingplan.app</p>
            <h1>AI Training Plan</h1>
          </div>
          <div class="mark">AI</div>
        </div>

        <label>
          Role
          <select id="role">
            <option selected>Operations manager</option>
            <option>Marketing manager</option>
            <option>Data analyst</option>
            <option>Software developer</option>
            <option>HR manager</option>
            <option>Sales manager</option>
          </select>
        </label>

        <label>
          Goal
          <textarea id="goal">Use AI to automate weekly reporting and improve team decision-making.</textarea>
        </label>

        <div class="row">
          <label>
            Skill level
            <select id="level">
              <option>Beginner</option>
              <option selected>Intermediate</option>
              <option>Advanced</option>
            </select>
          </label>

          <label>
            Hours weekly
            <input id="hours" type="number" min="1" max="20" value="4">
          </label>
        </div>

        <label>
          Focus
          <select id="focus">
            <option>Productivity</option>
            <option selected>Business workflow</option>
            <option>Marketing</option>
            <option>Data analysis</option>
            <option>Software delivery</option>
          </select>
        </label>

        <div class="actions">
          <button class="primary" id="generate">Generate plan</button>
          <button class="secondary" id="reset" title="Reset form" aria-label="Reset form">↺</button>
        </div>
      </section>

      <section class="panel output" aria-live="polite">
        <div class="output-head">
          <div>
            <p class="kicker" id="planLabel">4-week sprint</p>
            <h2 id="planTitle">AI adoption plan for an Operations manager</h2>
            <p class="meta" id="planMeta">Intermediate · Business workflow · 4 hours/week</p>
          </div>
          <button class="copy" id="copyPlan">Copy plan</button>
        </div>

        <div>
          <div class="weeks" id="weeks"></div>
          <div class="metrics" id="metrics"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const role = document.querySelector("#role");
    const goal = document.querySelector("#goal");
    const level = document.querySelector("#level");
    const hours = document.querySelector("#hours");
    const focus = document.querySelector("#focus");
    const weeks = document.querySelector("#weeks");
    const metrics = document.querySelector("#metrics");
    const planTitle = document.querySelector("#planTitle");
    const planMeta = document.querySelector("#planMeta");
    const planLabel = document.querySelector("#planLabel");

    const playbooks = {
      "Productivity": ["Map repetitive work", "Create prompt checklists", "Build a daily assistant routine", "Measure time saved"],
      "Business workflow": ["Find one handoff to improve", "Draft AI operating procedures", "Automate a weekly artifact", "Review quality with stakeholders"],
      "Marketing": ["Define audience segments", "Generate campaign variants", "Build a content review loop", "Track conversion signals"],
      "Data analysis": ["Clean one dataset", "Ask sharper business questions", "Create repeatable analysis prompts", "Turn findings into decisions"],
      "Software delivery": ["Pick a coding assistant workflow", "Add AI-assisted test planning", "Document review prompts", "Measure cycle-time impact"]
    };

    const rolePlaybooks = {
      "Operations manager": {
        "Productivity": ["Audit recurring admin tasks", "Create SOP prompt templates", "Automate status summaries", "Measure time saved by process"],
        "Business workflow": ["Map a cross-team handoff", "Draft AI-assisted SOPs", "Automate weekly operations reporting", "Review exceptions with stakeholders"],
        "Marketing": ["Coordinate campaign production tasks", "Create asset request briefs", "Build approval checklists", "Track operational bottlenecks"],
        "Data analysis": ["Clean workflow data", "Spot process delays", "Build recurring KPI prompts", "Turn findings into action owners"],
        "Software delivery": ["Clarify intake requirements", "Create release-readiness checklists", "Summarize sprint risks", "Measure delivery blockers"]
      },
      "Marketing manager": {
        "Productivity": ["Organize content requests", "Create reusable campaign prompts", "Draft briefing templates", "Measure approval speed"],
        "Business workflow": ["Map campaign intake", "Draft brand-safe AI guidelines", "Automate campaign recap notes", "Review outputs with sales"],
        "Marketing": ["Define audience segments", "Generate campaign variants", "Build a review and approval loop", "Track conversion signals"],
        "Data analysis": ["Clean campaign performance data", "Identify channel patterns", "Create insight prompts", "Turn findings into next tests"],
        "Software delivery": ["Write clearer growth experiment briefs", "Review landing-page copy with AI", "Document acceptance criteria", "Track launch friction"]
      },
      "Data analyst": {
        "Productivity": ["Standardize data request intake", "Create analysis prompt templates", "Automate first-pass summaries", "Measure report turnaround"],
        "Business workflow": ["Map stakeholder questions", "Draft repeatable analysis workflows", "Automate recurring insight briefs", "Review decisions made from data"],
        "Marketing": ["Segment campaign data", "Generate audience hypotheses", "Build reporting narratives", "Track test results"],
        "Data analysis": ["Clean one dataset", "Ask sharper business questions", "Create repeatable analysis prompts", "Turn findings into decisions"],
        "Software delivery": ["Translate metrics into backlog context", "Review event tracking plans", "Document dashboard QA prompts", "Measure data quality issues"]
      },
      "Software developer": {
        "Productivity": ["Audit coding interruptions", "Create reusable dev prompts", "Automate code review summaries", "Measure cycle-time gains"],
        "Business workflow": ["Map a delivery bottleneck", "Draft technical decision notes", "Automate sprint update artifacts", "Review quality with product"],
        "Marketing": ["Support experiment implementation briefs", "Generate technical copy drafts", "Create launch QA checklists", "Track site performance signals"],
        "Data analysis": ["Inspect application logs", "Ask debugging questions", "Create analysis snippets", "Turn findings into fixes"],
        "Software delivery": ["Pick a coding assistant workflow", "Add AI-assisted test planning", "Document review prompts", "Measure cycle-time impact"]
      },
      "HR manager": {
        "Productivity": ["Audit recurring people-ops tasks", "Create policy response templates", "Draft onboarding checklists", "Measure request turnaround"],
        "Business workflow": ["Map employee lifecycle handoffs", "Draft AI usage guardrails", "Automate weekly HR summaries", "Review sensitive outputs carefully"],
        "Marketing": ["Draft employer-brand messages", "Generate candidate nurture ideas", "Build review checklists", "Track response quality"],
        "Data analysis": ["Clean engagement survey data", "Identify workforce trends", "Create people analytics prompts", "Turn findings into manager actions"],
        "Software delivery": ["Clarify HR systems requirements", "Review support ticket patterns", "Document rollout prompts", "Measure adoption friction"]
      },
      "Sales manager": {
        "Productivity": ["Audit rep admin work", "Create call prep prompts", "Draft follow-up templates", "Measure selling time gained"],
        "Business workflow": ["Map lead handoffs", "Draft AI-assisted pipeline routines", "Automate forecast notes", "Review deal risks with reps"],
        "Marketing": ["Convert campaign briefs into talk tracks", "Generate objection-handling variants", "Build message review loops", "Track lead quality signals"],
        "Data analysis": ["Clean pipeline data", "Spot stage conversion patterns", "Create forecast prompts", "Turn findings into coaching priorities"],
        "Software delivery": ["Write CRM improvement requests", "Review sales-tool workflows", "Document acceptance criteria", "Measure tool adoption blockers"]
      }
    };

    const levelTasks = {
      "Beginner": ["learn the core vocabulary", "practice with guided examples", "keep every output human-reviewed"],
      "Intermediate": ["standardize the best prompts", "connect AI output to real work", "compare results against a baseline"],
      "Advanced": ["design reusable workflows", "add evaluation criteria", "teach the workflow to another teammate"]
    };

    function clean(value, fallback) {
      return value.trim().replace(/\s+/g, " ") || fallback;
    }

    function articleFor(value) {
      return /^(operations|hr)\b/i.test(value) ? "an" : "a";
    }

    function buildPlan() {
      const currentRole = clean(role.value, "knowledge worker");
      const currentGoal = clean(goal.value, "build practical AI confidence");
      const currentLevel = level.value;
      const weeklyHours = Math.max(1, Math.min(20, Number(hours.value) || 4));
      const currentFocus = focus.value;
      const tasks = rolePlaybooks[currentRole]?.[currentFocus] || playbooks[currentFocus];
      const calibrations = levelTasks[currentLevel];

      planTitle.textContent = `AI adoption plan for ${articleFor(currentRole)} ${currentRole}`;
      planMeta.textContent = `${currentLevel} · ${currentFocus} · ${weeklyHours} hours/week`;
      planLabel.textContent = `${weeklyHours * 4}-hour practical sprint`;

      weeks.innerHTML = tasks.map((task, index) => {
        const calibration = calibrations[index % calibrations.length];
        const deliverable = index === 3 ? "share a one-page results note" : "ship one usable work artifact";
        return `
          <article class="week">
            <h3>Week ${index + 1}: ${task}</h3>
            <ul>
              <li>Spend ${Math.ceil(weeklyHours * 0.35)} hour(s) on examples tied to: ${currentGoal}</li>
              <li>${calibration.charAt(0).toUpperCase() + calibration.slice(1)}.</li>
              <li>Use AI to ${deliverable}, then revise it manually.</li>
            </ul>
          </article>
        `;
      }).join("");

      metrics.innerHTML = `
        <div class="metric"><strong>${weeklyHours * 4}</strong><span>total hours</span></div>
        <div class="metric"><strong>4</strong><span>deliverables</span></div>
        <div class="metric"><strong>1</strong><span>repeatable workflow</span></div>
      `;
    }

    function planAsText() {
      const weekText = Array.from(weeks.querySelectorAll(".week")).map((week) => {
        const title = week.querySelector("h3").textContent;
        const items = Array.from(week.querySelectorAll("li")).map((li) => `- ${li.textContent}`).join("\n");
        return `${title}\n${items}`;
      }).join("\n\n");
      return `${planTitle.textContent}\n${planMeta.textContent}\n\n${weekText}`;
    }

    document.querySelector("#generate").addEventListener("click", buildPlan);
    document.querySelector("#reset").addEventListener("click", () => {
      role.value = "Operations manager";
      goal.value = "Use AI to automate weekly reporting and improve team decision-making.";
      level.value = "Intermediate";
      hours.value = 4;
      focus.value = "Business workflow";
      buildPlan();
    });
    [role, level, hours, focus].forEach((control) => control.addEventListener("change", buildPlan));
    goal.addEventListener("input", buildPlan);
    document.querySelector("#copyPlan").addEventListener("click", async () => {
      await navigator.clipboard.writeText(planAsText());
      document.querySelector("#copyPlan").textContent = "Copied";
      setTimeout(() => document.querySelector("#copyPlan").textContent = "Copy plan", 1400);
    });

    buildPlan();
  </script>
</body>
</html>
